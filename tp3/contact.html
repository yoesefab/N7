<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Horizon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&display=swap');
        body { font-family: 'Geist', sans-serif; }
    </style>
</head>
<body class="bg-white text-[#1a1a1a]">
    <nav class="fixed top-0 w-full bg-white/80 backdrop-blur-md border-b border-slate-200 z-50">
        <div class="max-w-5xl mx-auto px-6 h-14 flex justify-between items-center text-sm">
            <a href="index.html" class="font-semibold uppercase">HORIZON.</a>
            <div class="flex gap-6 text-slate-500">
                <a href="index.html" class="hover:text-black transition">Accueil</a>
                <a href="about.html" class="hover:text-black transition">À propos</a>
                <a href="services.html" class="hover:text-black transition">Services</a>
                <a href="gallery.html" class="hover:text-black transition">Projets</a>
                <a href="contact.html" class="text-black font-medium">Contact</a>
            </div>
        </div>
    </nav>

    <main class="pt-32 pb-32 max-w-5xl mx-auto px-6">
        <div class="max-w-xl">
            <h2 class="text-3xl font-semibold mb-12">Ouvrons une perspective.</h2>
            <form class="space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold uppercase text-slate-400 tracking-widest">Identité</label>
                        <input type="text" placeholder="Prénom Nom" required class="w-full px-4 py-2.5 text-sm border border-slate-200 rounded outline-none focus:border-black transition bg-slate-50/50">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold uppercase text-slate-400 tracking-widest">Email Professionnel</label>
                        <input type="email" placeholder="contact@cie.com" required class="w-full px-4 py-2.5 text-sm border border-slate-200 rounded outline-none focus:border-black transition bg-slate-50/50">
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-bold uppercase text-slate-400 tracking-widest">Message</label>
                    <textarea rows="6" placeholder="Décrivez votre projet..." required class="w-full px-4 py-2.5 text-sm border border-slate-200 rounded outline-none focus:border-black transition bg-slate-50/50 resize-none"></textarea>
                </div>
                <button type="submit" class="bg-black text-white text-sm font-medium px-8 py-3 rounded hover:bg-slate-800 transition shadow-sm">
                    Envoyer la demande
                </button>
            </form>
        </div>
    </main>

    <footer class="fixed bottom-0 w-full border-t border-slate-100 py-6 bg-white/80 backdrop-blur-sm text-[10px] text-slate-400 uppercase tracking-widest">
        <div class="max-w-5xl mx-auto px-6 flex justify-between">
            <span>contact@horizon.com</span>
            <span>Paris / Worldwide</span>
        </div>
    </footer>
</body>
</html>
